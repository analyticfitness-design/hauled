# ─────────────────────────────────────────────────────────────────────
# Build & push — HAULED Frontend (Nuxt 4)
#
# Construye la imagen en runners de GitHub Actions y la sube a ghcr.io.
# EasyPanel solo hace `docker pull` — el host nunca compila.
#
# CÓMO USAR EN EASYPANEL:
#   1. Tras el primer build exitoso, marca el package como PUBLIC en:
#      https://github.com/analyticfitness-design/hauled/pkgs/container/hauled
#   2. En EasyPanel, servicio frontend:
#        - Source type: "Docker Image"
#        - Image: ghcr.io/analyticfitness-design/hauled:latest
#   3. Variables ENV (en EasyPanel UI):
#        APP_URL=https://hauled.shop
#        API_BASE_URL=https://api.hauled.shop
#        WHATSAPP_NUMBER=57...
#        WOMPI_PUBLIC_KEY=pub_prod_...
#        NODE_ENV=production
# ─────────────────────────────────────────────────────────────────────

name: Build & push Frontend image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image summary
        run: |
          echo "## ✅ Frontend image pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
